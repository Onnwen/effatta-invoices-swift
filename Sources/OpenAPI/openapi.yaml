openapi: 3.0.3

info:
  title: RestAPI Fatturazione (ASMx)
  description: API legacy .asmx con payload JSON serializzato nel campo d
  version: 1.0.0

servers:
  - url: https://{dominio}
    variables:
      dominio:
        default: example.com

paths:

  /webservice/RestAPI.asmx/login:
    post:
      summary: Login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login response (JSON serializzato in d)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsmXStringResponse'

  /webservice/RestAPI.asmx/creaDocumentoV2:
    post:
      summary: Crea Documento
      operationId: creaDocumentoV2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreaDocumentoRequest'
      responses:
        '200':
          description: Documento creato (JSON serializzato in d)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsmXStringResponse'

  /webservice/RestAPI.asmx/creaNotaCreditoTotale:
    post:
      summary: Crea Nota Credito Totale
      operationId: creaNotaCreditoTotale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreaNotaCreditoTotaleRequest'
      responses:
        '200':
          description: Nota credito creata (JSON serializzato in d)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsmXStringResponse'

components:
  schemas:

    # ======================
    # RESPONSE GENERICA ASMX
    # ======================
    AsmXStringResponse:
      type: object
      properties:
        d:
          type: string
          description: JSON serializzato (richiede seconda deserializzazione)

    # ======================
    # LOGIN
    # ======================
    LoginRequest:
      type: object
      required: [username, password, source]
      properties:
        username:
          type: string
        password:
          type: string
        source:
          type: string

    LoginData:
      type: object
      properties:
        token:
          type: string
        userId:
          type: string
        userNameParent:
          type: string
        email:
          type: string
        isPersonaFisica:
          type: integer
        nome:
          type: string
        cognome:
          type: string
        denominazione:
          type: string
        appTemplate:
          type: string
        regimeFiscale:
          type: string
        naturaEsenzioneIVA:
          $ref: '#/components/schemas/NaturaIVA'
        qrCode:
          $ref: '#/components/schemas/QrCode'
        SDI:
          $ref: '#/components/schemas/SDI'
        aliquotaIVADefault:
          type: string
        dataScadenzaAbbonamento:
          type: string
          format: date

    # ======================
    # CREA DOCUMENTO
    # ======================
    CreaDocumentoRequest:
      type: object
      required:
        - token
        - idMittente
        - datiGeneraliDocumento
        - prodList
      properties:
        token:
          type: string
        idMittente:
          type: string
        isPA:
          type: string
          example: "0"
        datiGeneraliDocumento:
          $ref: '#/components/schemas/DatiGeneraliDocumento'
        datiPagamento:
          $ref: '#/components/schemas/DatiPagamento'
        prodList:
          $ref: '#/components/schemas/ProdList'
        qrCode:
          $ref: '#/components/schemas/QrCodeDocumento'
        retFileType:
          type: string
          example: xml
        attachmentName:
          type: string
        attachmentContent:
          type: string
        sendDoc:
          type: integer
          example: 1

    CreaDocumentoData:
      type: object
      properties:
        errCode:
          type: string
        errMsg:
          type: string
        idDocumento:
          type: string
        fileContent:
          type: string
        fileName:
          type: string
        numeroDocumento:
          type: string
        docInfo:
          $ref: '#/components/schemas/DocInfo'

    # ======================
    # NOTA CREDITO
    # ======================
    CreaNotaCreditoTotaleRequest:
      type: object
      required: [token, idMittente, idFattura]
      properties:
        token:
          type: string
        idMittente:
          type: string
        idFattura:
          type: string

    CreaNotaCreditoTotaleData:
      type: object
      properties:
        errCode:
          type: string
        errMsg:
          type: string
        idNotaCredito:
          type: string

    # ======================
    # ENUM & TIPI FISCALI
    # ======================
    RegimeFiscale:
      type: string
      enum:
        - ORDINARIO
        - CONTRIBUENTI_MINIMI
        - AGRICOLTURA_E_PESCA
        - VENDITA_SALI_E_TABACCHI
        - COMMERCIO_FIAMMIFERI
        - EDITORIA
        - SERVIZI_TELEFONIA
        - RIVENDITA_TRASPORTI_E_SOSTA
        - INTRATTENIMENTI_E_GIOCHI
        - AGENZIE_VIAGGI_E_TURISMO
        - AGRITURISMO
        - VENDITE_A_DOMICILIO
        - REGIME_DEL_MARGINE
        - ASTE_OGGETTI_ARTE
        - IVA_PER_CASSA_PA
        - IVA_PER_CASSA
        - ALTRO
        - REGIME_FORFETTARIO

    ModalitaPagamento:
      type: string
      enum:
        - MP01
        - MP02
        - MP03
        - MP04
        - MP05
        - MP06
        - MP07
        - MP08
        - MP09
        - MP10
        - MP11
        - MP12
        - MP13
        - MP14
        - MP15
        - MP16
        - MP17
        - MP18
        - MP19
        - MP20
        - MP21
        - MP22
        - MP23

    TipoDocumento:
      type: string
      enum:
        - TD01
        - TD02
        - TD03
        - TD04
        - TD05
        - TD06
        - TD16
        - TD17
        - TD18
        - TD19
        - TD20
        - TD21
        - TD22
        - TD23
        - TD24
        - TD25
        - TD26
        - TD27

    NaturaIVA:
      type: string
      enum:
        - N1
        - N2.1
        - N2.2
        - N3.1
        - N3.2
        - N3.3
        - N3.4
        - N3.5
        - N3.6
        - N4
        - N5
        - N6.1
        - N6.2
        - N6.3
        - N6.4
        - N6.5
        - N6.6
        - N6.7
        - N6.8
        - N6.9
        - N7

    TipoRitenuta:
      type: string
      enum:
        - RT01
        - RT02
        - RT03
        - RT04
        - RT05
        - RT06

    # ======================
    # STRUTTURE COMUNI
    # ======================
    DatiGeneraliDocumento:
      type: object
      properties:
        causale:
          type: string
        numeroDocumento:
          type: string
        dataDocumento:
          type: string
          format: date
        importoBollo:
          type: string
        tipoDocumento:
          $ref: '#/components/schemas/TipoDocumento'
        regimeFiscale:
          $ref: '#/components/schemas/RegimeFiscale'
        arrotondamento:
          type: number
        aliquotaRitenuta:
          type: number
        importoSconto:
          type: number
        percentualeSconto:
          type: number

    DatiPagamento:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: '#/components/schemas/Pagamento'

    Pagamento:
      type: object
      properties:
        modalitaPagamento:
          $ref: '#/components/schemas/ModalitaPagamento'
        dataScadenzaPagamento:
          type: string
          format: date
        importoPagamento:
          type: string
        iban:
          type: string
        istitutoFinanziario:
          type: string

    ProdList:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: '#/components/schemas/Prodotto'

    Prodotto:
      type: object
      properties:
        numeroLinea:
          type: integer
        descrizione:
          type: string
        quantita:
          type: number
        prezzoUnitario:
          type: string
        prezzoTotale:
          type: string
        aliquotaIva:
          type: string
        natura:
          $ref: '#/components/schemas/NaturaIVA'

    QrCode:
      type: object
      properties:
        qrCodeAgEnt:
          type: string
        anag:
          $ref: '#/components/schemas/Anagrafica'

    QrCodeDocumento:
      type: object
      properties:
        anag:
          $ref: '#/components/schemas/Anagrafica'
        dtGenQr:
          type: string
          format: date
        SDI:
          $ref: '#/components/schemas/SDI'

    Anagrafica:
      type: object
      properties:
        naz:
          type: string
        cf:
          type: string
        piva:
          type: string
        denom:
          type: string
        domFisc:
          $ref: '#/components/schemas/DomicilioFiscale'

    DomicilioFiscale:
      type: object
      properties:
        prov:
          type: string
        cap:
          type: string
        com:
          type: string
        ind:
          type: string
        naz:
          type: string

    SDI:
      type: object
      properties:
        cod:
          type: string
        pec:
          type: string

    DocInfo:
      type: object
      properties:
        idDocumento:
          type: string
        Tipo:
          type: string
        CurrentState:
          type: string
        StatoDocumento:
          type: string
        Denominazione:
          type: string
        fgen_TipoDocumento:
          type: string
        fgen_DataDocumento:
          type: string
          format: date
        fgen_Numero:
          type: string
        fgen_ImportoTotaleDocumento:
          type: string
        fgen_Causale:
          type: string
